name: Windows Desktop Packaging (bolt-ui)

# NATIVE-DESKTOP-WINDOWS-1: Validates bolt-ui builds and packages on Windows.
# Proves the MSI packaging path that cannot be validated from macOS/Linux.

on:
  push:
    branches: [main]
    paths:
      - 'rust/bolt-ui/**'
      - 'rust/bolt-app-core/**'
      - 'rust/bolt-core/**'
      - '.github/workflows/ci-windows-desktop.yml'
  pull_request:
    branches: [main]
    paths:
      - 'rust/bolt-ui/**'
      - 'rust/bolt-app-core/**'
      - 'rust/bolt-core/**'
      - '.github/workflows/ci-windows-desktop.yml'
  workflow_dispatch: # Allow manual trigger for initial validation

permissions:
  contents: read

jobs:
  windows-desktop:
    name: Windows bolt-ui build + MSI package
    runs-on: windows-latest
    defaults:
      run:
        working-directory: rust
    steps:
      - uses: actions/checkout@v4

      - uses: dtolnay/rust-toolchain@stable

      - name: Install cargo-bundle
        run: cargo install cargo-bundle

      - name: Build bolt-ui (release)
        run: cargo build --release -p bolt-ui

      - name: Verify binary exists
        run: |
          dir target\release\bolt-ui.exe
          echo "Binary size:"
          (Get-Item target\release\bolt-ui.exe).Length

      - name: Run bolt-app-core tests
        run: cargo test -p bolt-app-core

      - name: Run bolt-ui tests
        run: cargo test -p bolt-ui

      - name: Package MSI
        working-directory: rust/bolt-ui
        run: cargo bundle --release -f msi
        continue-on-error: true # MSI may need WiX — report result either way

      - name: Report MSI result
        working-directory: rust
        run: |
          if (Test-Path "target\release\bundle\msi\*.msi") {
            echo "MSI_STATUS=PASS" >> $env:GITHUB_OUTPUT
            echo "MSI packaging: PASS"
            dir target\release\bundle\msi\*.msi
          } else {
            echo "MSI_STATUS=FAIL" >> $env:GITHUB_OUTPUT
            echo "MSI packaging: FAIL (WiX may not be available)"
            echo "Binary build succeeded — MSI needs WiX toolset"
          }

      - name: Upload artifacts
        uses: actions/upload-artifact@v4
        with:
          name: windows-desktop-artifacts
          path: |
            rust/target/release/bolt-ui.exe
            rust/target/release/bundle/msi/*.msi
          if-no-files-found: warn
