name: Publish @the9ines/bolt-transport-web to npmjs.org

on:
  workflow_dispatch:
    inputs:
      dry_run:
        description: 'Dry run (skip actual publish)'
        required: false
        default: 'false'

permissions:
  contents: read

jobs:
  publish:
    name: Build & Publish to npmjs
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: ts/bolt-transport-web
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: 20
          registry-url: https://registry.npmjs.org
          scope: '@the9ines'

      - name: Install dependencies
        run: npm ci
        env:
          NODE_AUTH_TOKEN: ${{ secrets.NPM_TOKEN }}

      - run: npm run build

      - name: Run bolt-core gate
        working-directory: ts/bolt-core
        run: |
          npm ci
          npm run build
          npm run test

      - name: Publish to npmjs.org
        if: inputs.dry_run != 'true'
        run: npm publish --registry https://registry.npmjs.org --access public
        env:
          NODE_AUTH_TOKEN: ${{ secrets.NPM_TOKEN }}

      - name: Smoke test from npmjs (no PAT)
        if: inputs.dry_run != 'true'
        run: |
          VERSION=$(node -p "require('${{ github.workspace }}/ts/bolt-transport-web/package.json').version")
          mkdir -p /tmp/smoke-test && cd /tmp/smoke-test
          npm init -y
          npm install @the9ines/bolt-transport-web@${VERSION} --registry https://registry.npmjs.org
          node --input-type=module -e "
            import { WebRTCService, WebSocketSignaling, store } from '@the9ines/bolt-transport-web';
            if (!WebRTCService || !WebSocketSignaling || !store) process.exit(1);
            console.log('npmjs smoke test passed: ${VERSION}');
          "
